<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SilverAtlas — Gümüş Bakım Rehberi</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@300;400;500;600&family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0f14;--bg2:#1a1a24;--bg3:#111118;--text:#e8e8ec;--text2:#9a9aaa;--border:rgba(192,192,192,0.1);--accent:#C0C0C0;--gold:#D4AF37;--green:#7BE495;--red:#FF6B6B;--blue:#6EC6FF;--purple:#C9A0DC;--fd:'Playfair Display',Georgia,serif;--fb:'Source Sans 3','Segoe UI',sans-serif;}
.light{--bg:#FAFAF5;--bg2:#fff;--bg3:#f5f5f0;--text:#2C2C2C;--text2:#6B7280;--border:rgba(0,0,0,0.06);--accent:#708090;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--fb);background:var(--bg);color:var(--text);min-height:100vh;transition:background .4s,color .4s;}

.nav{position:sticky;top:0;z-index:100;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;background:var(--bg);border-bottom:1px solid var(--border);backdrop-filter:blur(16px);}
.nav-brand{display:flex;align-items:center;gap:8px;}
.nav-logo{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--gold));display:flex;align-items:center;justify-content:center;font:700 11px var(--fd);color:#0f0f14;}
.nav-title{font:600 15px var(--fd);}
.ctrls{display:flex;align-items:center;gap:10px;}
.lng{display:flex;gap:2px;background:rgba(128,128,128,.08);border-radius:6px;padding:2px;}
.lng button{border:none;cursor:pointer;padding:3px 8px;border-radius:4px;font-size:11px;background:transparent;color:var(--text2);transition:all .2s;font-family:var(--fb);}
.lng button.on{background:rgba(192,192,192,.15);color:var(--text);font-weight:600;}
.mbtn{border:none;cursor:pointer;background:transparent;color:var(--text2);font-size:15px;}

.container{max-width:680px;margin:0 auto;padding:32px 24px 64px;}

/* Hero */
.hero{text-align:center;margin-bottom:40px;}
.hero .badge{display:inline-block;padding:4px 14px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.1em;color:var(--gold);border:1px solid rgba(212,175,55,.3);margin-bottom:16px;text-transform:uppercase;}
.hero h1{font:700 clamp(26px,5vw,38px)/1.15 var(--fd);margin-bottom:12px;}
.hero p{font-size:15px;color:var(--text2);line-height:1.7;max-width:500px;margin:0 auto;}

/* Progress */
.progress{display:flex;align-items:center;gap:4px;justify-content:center;margin-bottom:32px;}
.prog-dot{width:10px;height:10px;border-radius:50%;background:var(--border);transition:all .3s;}
.prog-dot.done{background:var(--green);}
.prog-dot.current{background:var(--gold);box-shadow:0 0 8px rgba(212,175,55,.4);}
.prog-line{width:20px;height:2px;background:var(--border);border-radius:1px;transition:background .3s;}
.prog-line.done{background:var(--green);}

/* Step card */
.step-card{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:32px 28px;animation:fadeUp .4s ease;position:relative;overflow:hidden;}
.step-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:18px 18px 0 0;}
.step-icon{font-size:36px;margin-bottom:16px;display:block;}
.step-q{font:600 20px/1.3 var(--fd);margin-bottom:8px;}
.step-desc{font-size:14px;color:var(--text2);line-height:1.7;margin-bottom:24px;}

/* Options */
.options{display:flex;flex-direction:column;gap:10px;}
.opt-btn{display:flex;align-items:center;gap:14px;width:100%;border:1.5px solid var(--border);border-radius:14px;padding:16px 18px;cursor:pointer;background:transparent;color:var(--text);font:14px/1.4 var(--fb);text-align:left;transition:all .25s;}
.opt-btn:hover{border-color:var(--gold);background:rgba(212,175,55,.04);transform:translateX(4px);}
[dir=rtl] .opt-btn:hover{transform:translateX(-4px);}
.opt-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.opt-text{flex:1;}
.opt-title{font-weight:600;margin-bottom:2px;}
.opt-sub{font-size:12px;color:var(--text2);}
.opt-arrow{color:var(--text2);font-size:16px;transition:transform .2s;}
.opt-btn:hover .opt-arrow{transform:translateX(3px);color:var(--gold);}
[dir=rtl] .opt-btn:hover .opt-arrow{transform:translateX(-3px);}

/* Result card */
.result{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:32px 28px;animation:fadeUp .4s ease;}
.result-badge{display:inline-block;padding:4px 12px;border-radius:8px;font-size:11px;font-weight:600;margin-bottom:16px;}
.result h2{font:600 22px/1.3 var(--fd);margin-bottom:12px;}
.result>p{font-size:14px;color:var(--text2);line-height:1.7;margin-bottom:20px;}

/* Steps list */
.steps-list{display:flex;flex-direction:column;gap:12px;margin-bottom:24px;}
.sl-item{display:flex;gap:12px;align-items:flex-start;}
.sl-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;margin-top:2px;}
.sl-content{flex:1;}
.sl-title{font-weight:600;font-size:14px;margin-bottom:2px;}
.sl-desc{font-size:13px;color:var(--text2);line-height:1.6;}

/* Warning box */
.warn{display:flex;gap:10px;padding:14px 16px;border-radius:10px;margin-bottom:20px;font-size:13px;line-height:1.6;}
.warn-icon{font-size:18px;flex-shrink:0;margin-top:1px;}

/* Buttons */
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px;}
.btn{border:none;cursor:pointer;padding:12px 24px;border-radius:10px;font:600 13px var(--fb);transition:all .2s;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--gold));color:#0f0f14;}
.btn-primary:hover{transform:scale(1.03);box-shadow:0 8px 24px rgba(212,175,55,.2);}
.btn-secondary{background:transparent;border:1px solid var(--border);color:var(--text);}
.btn-secondary:hover{border-color:var(--accent);}
.btn-ig{background:linear-gradient(135deg,#833AB4,#FD1D1D,#F77737);color:#fff;}
.btn-ig:hover{transform:scale(1.03);}

/* Sponsor */
.sponsor{border:1px solid rgba(212,175,55,.15);border-radius:16px;padding:24px;text-align:center;margin-top:28px;background:rgba(212,175,55,.02);}
.sponsor p{font-size:14px;line-height:1.6;margin-bottom:14px;}
.sponsor .note{font-size:11px;color:var(--text2);margin-top:12px;opacity:.7;}

/* Path breadcrumb */
.path{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:20px;}
.path-item{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:6px;}
.path-dot{width:6px;height:6px;border-radius:50%;}

footer{border-top:1px solid var(--border);padding:24px;text-align:center;background:var(--bg3);margin-top:48px;}
footer p{font-size:11px;color:var(--text2);}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="app">
  <nav class="nav">
    <div class="nav-brand"><div class="nav-logo">Ag</div><span class="nav-title">SilverAtlas</span></div>
    <div class="ctrls">
      <div class="lng" id="langG"></div>
      <button class="mbtn" id="modeB">☀️</button>
    </div>
  </nav>
  <div class="container" id="main"></div>
  <footer><p>CC BY-NC-SA 4.0 · SilverAtlas · Sponsored by İstanbul Gümüş</p></footer>
</div>

TREE.en.result_medium_tarnish.title = "Medium Tarnish — Baking Soda Method";

TREE.en.result_medium_tarnish.prevention = ["Apply perfume and lotion BEFORE putting on jewelry","Remove during household cleaning and dishwashing","Quick weekly wipe with a silver cloth"];
TREE.en.result_heavy_tarnish.title = "Heavy Tarnish — Professional Cleaning";

// ─── STATE ───────────────────────────────────────────────
let lang = "tr", dark = true;
let history = []; // path of node IDs
let currentNode = "start";

function tree() { return TREE[lang] || TREE.tr; }
function node() { return tree()[currentNode]; }

const SEV_CONFIG = {
  low:    {color:"#7BE495",bg:"rgba(123,228,149,.08)",label:{tr:"Kolay Çözüm",en:"Easy Fix",ar:"حل سهل"}},
  medium: {color:"#FFB86C",bg:"rgba(255,184,108,.08)",label:{tr:"Orta Zorluk",en:"Medium",ar:"متوسط"}},
  high:   {color:"#FF6B6B",bg:"rgba(255,107,107,.08)",label:{tr:"Profesyonel Destek",en:"Professional Help",ar:"مساعدة مهنية"}},
};

const UI_TEXT = {
  tr:{restart:"Baştan Başla",back:"Geri",prevention:"Önleme İpuçları",warning:"⚠️ Dikkat",sponsorText:"Profesyonel gümüş bakım ürünleri ve uzman ipuçları için",sponsorCta:"Instagram'da Gör",sponsorNote:"Bu içerik İstanbul Gümüş tarafından desteklenmektedir.",badge:"✨ Bakım Rehberi",title:"Gümüş Bakım Sorun Giderme",sub:"Takınızdaki sorunu teşhis edin, size özel çözüm adımlarını alın."},
  en:{restart:"Start Over",back:"Back",prevention:"Prevention Tips",warning:"⚠️ Warning",sponsorText:"For professional silver care products and expert tips",sponsorCta:"View on Instagram",sponsorNote:"This content is supported by İstanbul Gümüş.",badge:"✨ Care Guide",title:"Silver Care Troubleshooter",sub:"Diagnose your jewelry issue and get personalized solution steps."},
  ar:{restart:"ابدأ من جديد",back:"رجوع",prevention:"نصائح الوقاية",warning:"⚠️ تحذير",sponsorText:"لمنتجات العناية بالفضة المهنية ونصائح الخبراء",sponsorCta:"شاهد على إنستغرام",sponsorNote:"هذا المحتوى مدعوم من إسطنبول غوموش.",badge:"✨ دليل العناية",title:"مستكشف أعطال العناية بالفضة",sub:"شخّص مشكلة مجوهراتك واحصل على خطوات حل مخصصة."},
};
function ut(k){ return UI_TEXT[lang]?.[k] || UI_TEXT.en?.[k] || k; }

// ─── RENDER ──────────────────────────────────────────────
function render() {
  const main = document.getElementById("main");
  const nd = node();

  // Lang buttons
  document.getElementById("langG").innerHTML = ["tr","en","ar"].map(l =>
    `<button class="${lang===l?"on":""}" onclick="setLang('${l}')" ${l==="ar"?'style="font-family:Noto Naskh Arabic,serif"':""}>${l==="ar"?"عر":l.toUpperCase()}</button>`
  ).join("");

  if (!nd) { currentNode = "start"; history = []; render(); return; }

  // Build progress dots
  const totalSteps = history.length + 1;
  let progHTML = '<div class="progress">';
  for (let i = 0; i < totalSteps; i++) {
    if (i > 0) progHTML += `<div class="prog-line ${i < totalSteps ? "done" : ""}"></div>`;
    progHTML += `<div class="prog-dot ${i < totalSteps - 1 ? "done" : "current"}"></div>`;
  }
  progHTML += '</div>';

  // Path breadcrumb
  let pathHTML = '<div class="path">';
  history.forEach((hId, i) => {
    const hNode = tree()[hId];
    if (hNode && hNode.options) {
      const chosen = hNode.options.find(o => {
        // find which option led to next step
        const nextId = history[i + 1] || currentNode;
        return o.next === nextId;
      });
      if (chosen) {
        pathHTML += `<div class="path-item"><div class="path-dot" style="background:${chosen.color}"></div>${chosen.label}</div>`;
        if (i < history.length - 1 || !nd.type) pathHTML += `<span style="color:var(--text2);font-size:10px">›</span>`;
      }
    }
  });
  pathHTML += '</div>';

  let html = '';

  // Hero (only on start)
  if (currentNode === "start") {
    html += `
      <div class="hero">
        <div class="badge">${ut("badge")}</div>
        <h1>${ut("title")}</h1>
        <p>${ut("sub")}</p>
      </div>`;
  } else {
    html += progHTML;
    html += pathHTML;
  }

  if (nd.type === "result") {
    // RESULT NODE
    const sev = SEV_CONFIG[nd.severity] || SEV_CONFIG.medium;
    html += `<div class="result">
      <span class="result-badge" style="background:${sev.bg};color:${sev.color}">${sev.label[lang] || sev.label.en}</span>
      <div style="font-size:36px;margin-bottom:12px">${nd.icon}</div>
      <h2>${nd.title}</h2>
      <p>${nd.desc}</p>
      <div class="steps-list">
        ${nd.steps.map((s, i) => `
          <div class="sl-item">
            <div class="sl-num" style="background:${sev.bg};color:${sev.color}">${i + 1}</div>
            <div class="sl-content">
              <div class="sl-title">${s.t}</div>
              <div class="sl-desc">${s.d}</div>
            </div>
          </div>`).join("")}
      </div>
      ${nd.warnings && nd.warnings.length ? nd.warnings.map(w => `
        <div class="warn" style="background:rgba(255,107,107,.06);border-radius:10px;">
          <span class="warn-icon">⚠️</span>
          <span style="color:var(--text2)">${w}</span>
        </div>`).join("") : ""}
      ${nd.prevention && nd.prevention.length ? `
        <div style="margin-top:16px">
          <div style="font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">🛡️ ${ut("prevention")}</div>
          ${nd.prevention.map(p => `<div style="display:flex;gap:8px;font-size:13px;color:var(--text2);margin-bottom:6px;line-height:1.5"><span style="color:var(--green)">✓</span><span>${p}</span></div>`).join("")}
        </div>` : ""}
      <div class="btn-row">
        ${history.length > 0 ? `<button class="btn btn-secondary" onclick="goBack()">← ${ut("back")}</button>` : ""}
        <button class="btn btn-secondary" onclick="restart()">⟲ ${ut("restart")}</button>
      </div>
      <div class="sponsor">
        <p>${ut("sponsorText")}</p>
        <a href="https://instagram.com/istanbulgumustr" target="_blank" rel="noopener" class="btn btn-ig">📸 ${ut("sponsorCta")}</a>
        <div class="note">${ut("sponsorNote")}</div>
      </div>
    </div>`;
  } else {
    // QUESTION NODE
    html += `<div class="step-card">
      <span class="step-icon">${nd.icon}</span>
      <div class="step-q">${nd.question}</div>
      <div class="step-desc">${nd.desc}</div>
      <div class="options">
        ${nd.options.map(opt => `
          <button class="opt-btn" onclick="navigate('${opt.next}')">
            <div class="opt-icon" style="background:${opt.color}15;color:${opt.color}">${opt.icon}</div>
            <div class="opt-text">
              <div class="opt-title">${opt.label}</div>
              ${opt.sub ? `<div class="opt-sub">${opt.sub}</div>` : ""}
            </div>
            <span class="opt-arrow">${document.documentElement.dir === "rtl" ? "‹" : "›"}</span>
          </button>`).join("")}
      </div>
      ${history.length > 0 ? `<div class="btn-row" style="margin-top:20px"><button class="btn btn-secondary" onclick="goBack()">← ${ut("back")}</button></div>` : ""}
    </div>`;
  }

  main.innerHTML = html;
}

function navigate(nextId) {
  history.push(currentNode);
  currentNode = nextId;
  render();
  window.scrollTo({ top: 0, behavior: "smooth" });
}
function goBack() {
  if (history.length > 0) {
    currentNode = history.pop();
    render();
  }
}
function restart() {
  history = [];
  currentNode = "start";
  render();
  window.scrollTo({ top: 0, behavior: "smooth" });
}
function setLang(l) {
  lang = l;
  document.documentElement.dir = l === "ar" ? "rtl" : "ltr";
  history = [];
  currentNode = "start";
  render();
}

document.getElementById("modeB").onclick = () => {
  dark = !dark;
  document.body.classList.toggle("light", !dark);
  document.getElementById("modeB").textContent = dark ? "☀️" : "🌙";
};

render();
</script>
</body>
</html>
