<title>SilverAtlas — Taş Rehberi</title>

<style>
:root{
  --bg:#0f0f14;--bg2:#1a1a24;--bg3:#111118;--text:#e8e8ec;--text2:#9a9aaa;
  --border:rgba(192,192,192,0.1);--accent:#C0C0C0;--gold:#D4AF37;
  --fd:'Playfair Display',Georgia,serif;--fb:'Source Sans 3','Segoe UI',sans-serif;
}
.light{--bg:#FAFAF5;--bg2:#fff;--bg3:#f5f5f0;--text:#2C2C2C;--text2:#6B7280;--border:rgba(0,0,0,0.06);--accent:#708090;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--fb);background:var(--bg);color:var(--text);min-height:100vh;transition:background .4s,color .4s;}

/* NAV */
.nav{position:sticky;top:0;z-index:100;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;background:var(--bg);border-bottom:1px solid var(--border);backdrop-filter:blur(16px);}
.nav-brand{display:flex;align-items:center;gap:8px;}
.nav-logo{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--gold));display:flex;align-items:center;justify-content:center;font:700 11px var(--fd);color:#0f0f14;}
.nav-title{font:600 15px var(--fd);}
.ctrls{display:flex;align-items:center;gap:10px;}
.lng{display:flex;gap:2px;background:rgba(128,128,128,.08);border-radius:6px;padding:2px;}
.lng button{border:none;cursor:pointer;padding:3px 8px;border-radius:4px;font-size:11px;background:transparent;color:var(--text2);transition:all .2s;font-family:var(--fb);}
.lng button.on{background:rgba(192,192,192,.15);color:var(--text);font-weight:600;}
.mbtn{border:none;cursor:pointer;background:transparent;color:var(--text2);font-size:15px;}

/* HERO */
.hero{text-align:center;padding:48px 24px 32px;max-width:700px;margin:0 auto;}
.hero .badge{display:inline-block;padding:4px 14px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.1em;color:var(--gold);border:1px solid rgba(212,175,55,.3);margin-bottom:16px;text-transform:uppercase;}
.hero h1{font:700 clamp(28px,5vw,42px)/1.15 var(--fd);margin-bottom:12px;}
.hero p{font-size:15px;color:var(--text2);line-height:1.7;max-width:540px;margin:0 auto 28px;}

/* FILTERS */
.filters{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;padding:0 24px 32px;max-width:800px;margin:0 auto;}
.fbtn{border:1px solid var(--border);border-radius:20px;padding:6px 16px;cursor:pointer;font-size:12px;background:transparent;color:var(--text2);transition:all .2s;font-family:var(--fb);}
.fbtn.on{border-color:var(--gold);background:rgba(212,175,55,.08);color:var(--gold);font-weight:600;}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;padding:0 24px 48px;max-width:1200px;margin:0 auto;}

/* CARD */
.card{position:relative;border:1px solid var(--border);border-radius:18px;overflow:hidden;cursor:pointer;transition:all .35s cubic-bezier(.4,0,.2,1);background:var(--bg2);}
.card:hover{transform:translateY(-6px);box-shadow:0 16px 48px rgba(0,0,0,.2);}
.light .card:hover{box-shadow:0 12px 36px rgba(0,0,0,.06);}

/* Card top: gemstone visual */
.card-vis{height:180px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.card-vis .gem-shape{width:80px;height:80px;position:relative;z-index:2;}
.card-vis .glow{position:absolute;width:160px;height:160px;border-radius:50%;filter:blur(40px);opacity:.3;z-index:1;}
.card-vis .sparkle{position:absolute;width:4px;height:4px;border-radius:50%;background:#fff;opacity:0;animation:sparkle 3s infinite;}
@keyframes sparkle{0%,100%{opacity:0;transform:scale(0)}50%{opacity:.8;transform:scale(1)}}

/* Card body */
.card-body{padding:20px;}
.card-name{font:600 18px/1.2 var(--fd);margin-bottom:4px;}
.card-formula{font-size:12px;color:var(--text2);margin-bottom:12px;font-style:italic;}

/* Mohs bar */
.mohs-wrap{margin-bottom:14px;}
.mohs-label{font-size:10px;color:var(--text2);margin-bottom:4px;display:flex;justify-content:space-between;}
.mohs-bar{height:6px;border-radius:3px;background:rgba(128,128,128,.1);overflow:hidden;position:relative;}
.mohs-fill{height:100%;border-radius:3px;transition:width .6s ease;}

/* Color dots */
.colors{display:flex;gap:5px;margin-bottom:14px;align-items:center;}
.colors span{font-size:10px;color:var(--text2);margin-right:4px;}
.cdot{width:14px;height:14px;border-radius:50%;border:1.5px solid rgba(128,128,128,.2);transition:transform .2s;}
.cdot:hover{transform:scale(1.3);}

/* Tags */
.tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:14px;}
.tag{padding:3px 9px;border-radius:12px;font-size:10px;border:1px solid var(--border);color:var(--text2);}

/* Info rows */
.info-rows{display:flex;flex-direction:column;gap:6px;}
.info-row{display:flex;justify-content:space-between;font-size:12px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.info-row:last-child{border-bottom:none;padding-bottom:0;}
.info-k{color:var(--text2);}
.info-v{font-weight:500;text-align:right;max-width:60%;}

/* Expanded detail */
.card-detail{max-height:0;overflow:hidden;transition:max-height .4s ease;padding:0 20px;}
.card-detail.open{max-height:600px;padding:0 20px 20px;}
.detail-section{margin-top:14px;}
.detail-section h4{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;}
.detail-section p{font-size:13px;color:var(--text2);line-height:1.7;}
.detail-tips{display:flex;flex-direction:column;gap:6px;}
.detail-tip{display:flex;gap:8px;font-size:12px;color:var(--text2);line-height:1.5;}
.tip-n{flex-shrink:0;width:20px;height:20px;border-radius:50%;background:rgba(212,175,55,.1);color:var(--gold);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;}
.expand-btn{display:flex;align-items:center;justify-content:center;padding:10px;font-size:11px;color:var(--text2);gap:4px;border-top:1px solid var(--border);transition:color .2s;}
.expand-btn:hover{color:var(--text);}

/* SPONSOR */
.sponsor{max-width:600px;margin:0 auto 64px;padding:32px 28px;border:1px solid rgba(212,175,55,.15);border-radius:18px;text-align:center;background:rgba(212,175,55,.02);}
.sponsor p{font-size:14px;color:var(--text);line-height:1.6;margin-bottom:16px;}
.sponsor a{display:inline-flex;align-items:center;gap:8px;padding:10px 24px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--gold));color:#0f0f14;font-size:13px;font-weight:600;text-decoration:none;transition:transform .2s;}
.sponsor a:hover{transform:scale(1.03);}
.sponsor .note{font-size:11px;color:var(--text2);margin-top:14px;opacity:.7;}

/* FOOTER */
footer{border-top:1px solid var(--border);padding:24px;text-align:center;background:var(--bg3);}
footer .brand{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:6px;}
footer .flogo{width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--gold));display:flex;align-items:center;justify-content:center;font:700 8px var(--fd);color:#0f0f14;}
footer p{font-size:11px;color:var(--text2);}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:fadeUp .5s ease both;}
</style>
</head>

    desc:{tr:"Art Deco döneminin ikonik taşı. Gümüşle doğal bir uyum içinde — metalik parlaklığı gümüşü tamamlar. Viktorya dönemi takılarının ruhu.",en:"Iconic stone of the Art Deco era. Natural harmony with silver — its metallic shine complements silver. The soul of Victorian jewelry.",ar:"الحجر الأيقوني لعصر آرت ديكو. تناغم طبيعي مع الفضة."},
    care:{tr:["Suya kesinlikle maruz bırakmayın — oksitlenir","Kuru ve serin ortamda saklayın","Yumuşak kuru fırça ile temizleyin","Parfüm ve terden koruyun"],en:["Never expose to water — will oxidize","Store in dry, cool environment","Clean with soft dry brush","Protect from perfume and sweat"],ar:["لا تعرض للماء أبداً — سيتأكسد","خزّن في بيئة جافة وباردة","نظف بفرشاة ناعمة جافة"]},
    cultural:{tr:"Viktorya kraliçesi'nin yas takılarında kullanıldı. Art Deco geometrik desenlerinin vazgeçilmez taşı.",en:"Used in Queen Victoria's mourning jewelry. Essential stone of Art Deco geometric patterns.",ar:"استُخدم في مجوهرات الحداد للملكة فيكتوريا."},
  },
];

// ─── I18N ────────────────────────────────────────────────
const UI = {
  tr:{badge:"💎 Taş Rehberi",title:"Gümüş Takılarda Kullanılan Taşlar",sub:"Her taşın hikâyesi, özellikleri, bakım rehberi ve kültürel anlamı — tek bir rehberde.",all:"Tümü",natural:"Doğal",synthetic:"Sentetik",mohs:"Sertlik (Mohs)",origin:"Köken",price:"Fiyat Segmenti",used:"Kullanım",care:"Bakım Rehberi",cultural:"Kültürel Anlam",affordable:"Uygun",mid:"Orta",premium:"Premium",more:"Detayları gör",less:"Kapat",sponsorText:"Bu taşların İstanbul Gümüş koleksiyonundaki eşsiz tasarımlarını keşfedin.",sponsorCta:"Instagram'da Gör",sponsorNote:"Bu içerik İstanbul Gümüş tarafından desteklenmektedir."},
  en:{badge:"💎 Gemstone Guide",title:"Gemstones Used in Silver Jewelry",sub:"Each stone's story, properties, care guide, and cultural meaning — all in one guide.",all:"All",natural:"Natural",synthetic:"Synthetic",mohs:"Hardness (Mohs)",origin:"Origin",price:"Price Tier",used:"Used In",care:"Care Guide",cultural:"Cultural Significance",affordable:"Affordable",mid:"Mid-range",premium:"Premium",more:"View details",less:"Close",sponsorText:"Discover these gemstones in İstanbul Gümüş's unique collection designs.",sponsorCta:"View on Instagram",sponsorNote:"This content is supported by İstanbul Gümüş."},
  ar:{badge:"💎 دليل الأحجار",title:"الأحجار المستخدمة في مجوهرات الفضة",sub:"قصة كل حجر وخصائصه ودليل العناية به ومعناه الثقافي — في دليل واحد.",all:"الكل",natural:"طبيعي",synthetic:"صناعي",mohs:"الصلابة (موس)",origin:"المنشأ",price:"الفئة السعرية",used:"الاستخدام",care:"دليل العناية",cultural:"الأهمية الثقافية",affordable:"ميسور",mid:"متوسط",premium:"فاخر",more:"عرض التفاصيل",less:"إغلاق",sponsorText:"اكتشف هذه الأحجار في تصاميم مجموعة إسطنبول غوموش الفريدة.",sponsorCta:"شاهد على إنستغرام",sponsorNote:"هذا المحتوى مدعوم من إسطنبول غوموش."},
};

let lang="tr",dark=true,filter="all",expanded=new Set();
const n=(o)=>o?.[lang]||o?.en||"";
const u=(k)=>UI[lang]?.[k]||k;

// ─── RENDER ──────────────────────────────────────────────
function render(){
  // Lang buttons
  const lg=document.getElementById("langG");
  lg.innerHTML=["tr","en","ar"].map(l=>`<button class="${lang===l?"on":""}" data-l="${l}" ${l==="ar"?'style="font-family:\'Noto Naskh Arabic\',serif"':""}>${l==="ar"?"عر":l.toUpperCase()}</button>`).join("");
  lg.querySelectorAll("button").forEach(b=>b.onclick=()=>{
    lang=b.dataset.l;
    document.documentElement.dir=lang==="ar"?"rtl":"ltr";
    render();
  });

  // Hero
  document.getElementById("heroBadge").textContent=u("badge");
  document.getElementById("heroTitle").textContent=u("title");
  document.getElementById("heroSub").textContent=u("sub");

  // Filters
  const ff=document.getElementById("filters");
  const filters=[{k:"all",l:u("all")},{k:"natural",l:u("natural")},{k:"synthetic",l:u("synthetic")}];
  ff.innerHTML=filters.map(f=>`<button class="fbtn ${filter===f.k?"on":""}" data-f="${f.k}">${f.l}</button>`).join("");
  ff.querySelectorAll(".fbtn").forEach(b=>b.onclick=()=>{filter=b.dataset.f;render();});

  // Grid
  const grid=document.getElementById("grid");
  const filtered=GEMS.filter(g=>filter==="all"||g.origin===filter);
  grid.innerHTML=filtered.map((gem,i)=>{
    const isOpen=expanded.has(gem.id);
    const mohsPct=(gem.mohs/10)*100;
    return `
    <div class="card anim" style="animation-delay:${i*0.08}s" data-id="${gem.id}">
      <div class="card-vis" style="background:linear-gradient(135deg,${gem.gradient[0]}15,${gem.gradient[1]}08)">
        <div class="glow" style="background:radial-gradient(circle,${gem.gradient[0]}40,transparent 70%)"></div>
        ${[0,1,2,3].map(s=>`<div class="sparkle" style="top:${20+Math.random()*60}%;left:${15+Math.random()*70}%;animation-delay:${s*0.8}s;background:${gem.colors[0]}"></div>`).join("")}
        <svg class="gem-shape" viewBox="0 0 80 80">
          <defs><linearGradient id="g${gem.id}" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="${gem.gradient[0]}"/><stop offset="100%" stop-color="${gem.gradient[1]}"/></linearGradient></defs>
          <polygon points="40,5 70,25 65,60 15,60 10,25" fill="url(#g${gem.id})" opacity=".85" stroke="${gem.colors[0]}" stroke-width=".5"/>
          <polygon points="40,5 55,20 40,35 25,20" fill="rgba(255,255,255,.15)"/>
          <line x1="40" y1="35" x2="65" y2="60" stroke="rgba(255,255,255,.08)" stroke-width=".5"/>
          <line x1="40" y1="35" x2="15" y2="60" stroke="rgba(255,255,255,.08)" stroke-width=".5"/>
        </svg>
      </div>
      <div class="card-body">
        <div class="card-name">${n(gem.name)}</div>
        <div class="card-formula">${gem.formula} · ${n(gem.aka)}</div>
        <div class="mohs-wrap">
          <div class="mohs-label"><span>${u("mohs")}</span><span>${gem.mohs}/10</span></div>
          <div class="mohs-bar"><div class="mohs-fill" style="width:${mohsPct}%;background:linear-gradient(90deg,${gem.gradient[0]},${gem.gradient[1]})"></div></div>
        </div>
        <div class="colors">
          <span>${lang==="tr"?"Renkler":lang==="en"?"Colors":"الألوان"}:</span>
          ${gem.colors.map((c,ci)=>`<div class="cdot" style="background:${c}" title="${gem.colorNames[lang]?.[ci]||""}"></div>`).join("")}
        </div>
        <div class="info-rows">
          <div class="info-row"><span class="info-k">${u("origin")}</span><span class="info-v">${u(gem.origin)}</span></div>
          <div class="info-row"><span class="info-k">${u("price")}</span><span class="info-v">${u(gem.price)}</span></div>
          <div class="info-row"><span class="info-k">${u("used")}</span><span class="info-v">${n(gem.used)}</span></div>
        </div>
      </div>
      <div class="card-detail ${isOpen?"open":""}">
        <div class="detail-section">
          <p>${n(gem.desc)}</p>
        </div>
        <div class="detail-section">
          <h4>${u("care")}</h4>
          <div class="detail-tips">
            ${(gem.care[lang]||gem.care.en).map((tip,ti)=>`<div class="detail-tip"><span class="tip-n">${ti+1}</span><span>${tip}</span></div>`).join("")}
          </div>
        </div>
        <div class="detail-section">
          <h4>${u("cultural")}</h4>
          <p>${n(gem.cultural)}</p>
        </div>
      </div>
      <div class="expand-btn" data-id="${gem.id}">
        ${isOpen?u("less")+" ▲":u("more")+" ▼"}
      </div>
    </div>`;
  }).join("");

  // Expand handlers
  grid.querySelectorAll(".expand-btn").forEach(btn=>{
    btn.onclick=(e)=>{
      e.stopPropagation();
      const id=btn.dataset.id;
      expanded.has(id)?expanded.delete(id):expanded.add(id);
      render();
    };
  });

  // Sponsor
  document.getElementById("sponsorBlock").innerHTML=`
    <p>${u("sponsorText")}</p>
    <a href="https://instagram.com/istanbulgumustr" target="_blank" rel="noopener">📸 ${u("sponsorCta")}</a>
    <div class="note">${u("sponsorNote")}</div>
  `;
}

// ─── DARK MODE ───────────────────────────────────────────
document.getElementById("modeB").onclick=()=>{
  dark=!dark;
  document.body.classList.toggle("light",!dark);
  document.getElementById("modeB").textContent=dark?"☀️":"🌙";
};

// ─── INIT ────────────────────────────────────────────────
render();
</script>
</body>
</html>
