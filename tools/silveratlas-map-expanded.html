<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SilverAtlas — Gümüş Dünya Haritası (Genişletilmiş)</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@300;400;500;600&family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f14; --bg2: #1a1a24; --bg3: #111118;
  --text: #e8e8ec; --text2: #9a9aaa;
  --border: rgba(192,192,192,0.1);
  --accent: #C0C0C0; --gold: #D4AF37;
  --mine-active: #7BE495; --mine-hist: #D4AF37;
  --craft: #E8A0BF; --mint: #C9A0DC; --route: #D4AF37;
  --font-d: 'Playfair Display', Georgia, serif;
  --font-b: 'Source Sans 3', 'Segoe UI', sans-serif;
}
.light {
  --bg: #FAFAF5; --bg2: #ffffff; --bg3: #f8f8f4;
  --text: #2C2C2C; --text2: #6B7280;
  --border: rgba(0,0,0,0.06);
  --accent: #708090;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: var(--font-b); background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; }
#app { display: flex; flex-direction: column; height: 100vh; }
.nav { height:52px; display:flex; align-items:center; justify-content:space-between; padding:0 20px; background: var(--bg); border-bottom:1px solid var(--border); flex-shrink:0; z-index:1000; }
.nav-brand { display:flex; align-items:center; gap:8px; }
.nav-logo { width:26px; height:26px; border-radius:50%; background:linear-gradient(135deg,var(--accent),var(--gold)); display:flex; align-items:center; justify-content:center; font:700 11px var(--font-d); color:#0f0f14; }
.nav-title { font:600 15px var(--font-d); color:var(--text); }
.nav-controls { display:flex; align-items:center; gap:10px; }
.lang-group { display:flex; gap:2px; background:rgba(128,128,128,0.08); border-radius:6px; padding:2px; }
.lang-btn { border:none; cursor:pointer; padding:3px 8px; border-radius:4px; font-size:11px; background:transparent; color:var(--text2); transition:all .2s; font-family:var(--font-b); }
.lang-btn.active { background:rgba(192,192,192,0.15); color:var(--text); font-weight:600; }
.mode-btn { border:none; cursor:pointer; background:transparent; color:var(--text2); font-size:15px; padding:4px; }
.main { display:flex; flex:1; overflow:hidden; }
.sidebar { width:300px; flex-shrink:0; border-right:1px solid var(--border); background:var(--bg3); padding:20px 16px; overflow-y:auto; display:flex; flex-direction:column; }
.sidebar h1 { font:700 20px/1.2 var(--font-d); margin-bottom:4px; }
.sidebar .sub { font-size:11px; color:var(--text2); margin-bottom:20px; line-height:1.5; }
.section-label { font-size:10px; font-weight:600; color:var(--text2); letter-spacing:.08em; text-transform:uppercase; margin-bottom:10px; }
.layer-btn { display:flex; align-items:center; gap:8px; width:100%; border:1px solid var(--border); border-radius:8px; padding:8px 10px; margin-bottom:6px; cursor:pointer; background:transparent; color:var(--text); font:12px var(--font-b); transition:all .2s; }
.layer-btn.on { border-color: var(--lc); background: color-mix(in srgb, var(--lc) 8%, transparent); }
.layer-check { width:12px; height:12px; border-radius:3px; border:2px solid var(--text2); transition:all .2s; flex-shrink:0; }
.layer-btn.on .layer-check { background:var(--lc); border-color:var(--lc); }
.filter-group { display:flex; gap:4px; flex-wrap:wrap; margin-bottom:16px; }
.filter-pill { border:1px solid var(--border); border-radius:6px; padding:4px 10px; cursor:pointer; font-size:10px; background:transparent; color:var(--text2); transition:all .2s; font-family:var(--font-b); }
.filter-pill.active { border-color:rgba(212,175,55,.5); background:rgba(212,175,55,.1); color:var(--gold); font-weight:600; }
/* Dynasty filter pills */
.dynasty-pill { border:1px solid var(--border); border-radius:6px; padding:4px 8px; cursor:pointer; font-size:9px; background:transparent; color:var(--text2); transition:all .2s; font-family:var(--font-b); }
.dynasty-pill.active { border-color:rgba(201,160,220,.5); background:rgba(201,160,220,.1); color:#C9A0DC; font-weight:600; }
.stats { font-size:11px; color:var(--text2); margin-bottom:16px; padding-bottom:12px; border-bottom:1px solid var(--border); }
.detail { background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:16px; animation:fadeUp .3s ease; position:relative; }
.detail-type { font-size:10px; font-weight:600; letter-spacing:.05em; text-transform:uppercase; margin-bottom:8px; }
.detail h3 { font:600 16px/1.3 var(--font-d); margin-bottom:8px; }
.detail p { font-size:12px; color:var(--text2); line-height:1.6; margin-bottom:10px; }
.detail-row { display:flex; gap:6px; font-size:11px; margin-bottom:4px; }
.detail-label { color:var(--text2); min-width:65px; }
.detail-val { color:var(--text); font-weight:500; }
.detail-tags { display:flex; gap:4px; flex-wrap:wrap; margin-top:6px; }
.detail-tag { padding:2px 7px; border-radius:4px; font-size:10px; background:rgba(128,128,128,.08); color:var(--text2); }
.detail-close { position:absolute; top:12px; right:12px; border:none; cursor:pointer; background:transparent; color:var(--text2); font-size:18px; }
.detail-link { display:inline-flex; align-items:center; gap:4px; margin-top:8px; padding:4px 10px; border-radius:6px; font-size:10px; color:var(--gold); border:1px solid rgba(212,175,55,.3); text-decoration:none; transition:all .2s; }
.detail-link:hover { background:rgba(212,175,55,.1); }
.hint { font-size:12px; color:var(--text2); text-align:center; padding:24px 12px; opacity:.6; line-height:1.6; }
.map-wrap { flex:1; position:relative; }
#map { width:100%; height:100%; z-index:1; }
.leaflet-container { background: var(--bg) !important; }
.legend { position:absolute; top:12px; left:12px; z-index:800; display:flex; gap:12px; flex-wrap:wrap; background:rgba(15,15,20,.82); backdrop-filter:blur(10px); border-radius:8px; padding:8px 14px; border:1px solid var(--border); pointer-events:none; }
.light .legend { background:rgba(250,250,245,.85); }
.legend-item { display:flex; align-items:center; gap:5px; font-size:10px; color:var(--text2); }
.legend-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.legend-diamond { width:8px; height:8px; border-radius:2px; transform:rotate(45deg); flex-shrink:0; }
.mint-counter { position:absolute; bottom:12px; left:12px; z-index:800; background:rgba(15,15,20,.82); backdrop-filter:blur(10px); border-radius:8px; padding:6px 14px; border:1px solid var(--border); font-size:11px; color:var(--text2); }
.light .mint-counter { background:rgba(250,250,245,.85); }
@keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
.leaflet-popup-content-wrapper { background:var(--bg2)!important; color:var(--text)!important; border:1px solid var(--border)!important; border-radius:10px!important; box-shadow:0 8px 32px rgba(0,0,0,.3)!important; }
.leaflet-popup-tip { background:var(--bg2)!important; border:1px solid var(--border)!important; }
.leaflet-popup-content { margin:12px 14px!important; font-family:var(--font-b)!important; font-size:12px!important; }
@media (max-width:768px) {
  .sidebar { display:none; }
  .legend { top:8px; left:8px; right:8px; }
}
</style>
</head>

      <div class="stats" id="statsLine"></div>
      <div id="detailPanel">
        <div class="hint" id="hintText">Detay için bir noktaya tıklayın</div>
      </div>
    </div>
    <div class="map-wrap">
      <div id="map"></div>
      <div class="legend" id="legend"></div>

    </div>
  </div>
</div>

  tr:{title:"Gümüş Dünya Haritası",sub:"15 Maden · 54 Darphane · 8 Zanaat Merkezi · 4 Güzergâh",layers:"Katmanlar",period:"Dönem",technique:"Teknik",coins:"Sikkeler",status:"Durum",dynasty:"Hanedan",active:"Aktif",historical:"Tarihî",declining:"Azalan",all:"Tümü",hint:"Detay için bir noktaya tıklayın",total:"toplam nokta",nav:"SilverAtlas",mines:"Madenler",crafts:"Zanaat Merkezleri",mints:"Darphaneler",routes:"Ticaret Güzergâhları",dynastyFilter:"Hanedan",darpislam:"DarpIslam'da Gör",crossref:"Çapraz Referans"},
  en:{title:"Silver World Map",sub:"15 Mines · 54 Mints · 8 Craft Centers · 4 Trade Routes",layers:"Layers",period:"Period",technique:"Technique",coins:"Coins",status:"Status",dynasty:"Dynasty",active:"Active",historical:"Historical",declining:"Declining",all:"All",hint:"Click a point for details",total:"total points",nav:"SilverAtlas",mines:"Mines",crafts:"Craft Centers",mints:"Mints",routes:"Trade Routes",dynastyFilter:"Dynasty",darpislam:"View on DarpIslam",crossref:"Cross-Reference"},
  ar:{title:"خريطة الفضة العالمية",sub:"١٥ منجم · ٥٤ دار ضرب · ٨ مراكز حرف · ٤ طرق تجارة",layers:"الطبقات",period:"الفترة",technique:"التقنية",coins:"العملات",status:"الحالة",dynasty:"السلالة",active:"نشط",historical:"تاريخي",declining:"متراجع",all:"الكل",hint:"انقر على نقطة للتفاصيل",total:"نقطة إجمالية",nav:"أطلس الفضة",mines:"المناجم",crafts:"مراكز الحرف",mints:"دور الضرب",routes:"طرق التجارة",dynastyFilter:"السلالة",darpislam:"عرض في دار الإسلام",crossref:"مرجع متقاطع"},
};

const LAYER_META = {
  mines: {color:"#7BE495",icon:"⛏️"},
  crafts:{color:"#E8A0BF",icon:"✋"},
  mints: {color:"#C9A0DC",icon:"🪙"},
  routes:{color:"#D4AF37",icon:"🛤️"},
};

// Dynasty list for filtering
const DYNASTIES = [...new Set(MINTS.map(m => m.dynasty))].sort();

let lang = "tr", isDark = true;
let layersOn = {mines:true, crafts:true, mints:true, routes:true};
let statusFilter = "all";
let dynastyFilter = "all";
let layerGroups = {};
let map;

function t(k){ return I18N[lang]?.[k] || k; }
function n(obj){ return obj?.[lang] || obj?.en || ""; }

const DARK_TILES = "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png";
const LIGHT_TILES = "https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png";
let tileLayer;

function initMap() {
  map = L.map("map", { center: [30, 30], zoom: 3, minZoom: 2, maxZoom: 12, zoomControl: false, attributionControl: false });
  L.control.zoom({ position: "bottomright" }).addTo(map);
  L.control.attribution({ prefix: false, position: "bottomright" })
    .addAttribution('© <a href="https://carto.com">CARTO</a> · © <a href="https://osm.org">OSM</a>')
    .addTo(map);
  tileLayer = L.tileLayer(isDark ? DARK_TILES : LIGHT_TILES, { subdomains: "abcd", maxZoom: 19 }).addTo(map);
  buildLayers();
}

function circleIcon(color, size=10, ring=false) {
  const border = ring ? "border:2px solid #fff;" : "";
  return L.divIcon({
    className: "",
    html: `<div style="width:${size}px;height:${size}px;border-radius:50%;background:${color};${border}box-shadow:0 0 8px ${color}66;cursor:pointer;transition:transform .2s;" onmouseenter="this.style.transform='scale(1.4)'" onmouseleave="this.style.transform='scale(1)'"></div>`,
    iconSize: [size, size], iconAnchor: [size/2, size/2],
  });
}
function diamondIcon(color, size=10) {
  return L.divIcon({
    className: "",
    html: `<div style="width:${size}px;height:${size}px;border-radius:2px;background:${color};transform:rotate(45deg);box-shadow:0 0 8px ${color}66;cursor:pointer;transition:transform .2s;" onmouseenter="this.style.transform='rotate(45deg) scale(1.4)'" onmouseleave="this.style.transform='rotate(45deg) scale(1)'"></div>`,
    iconSize: [size, size], iconAnchor: [size/2, size/2],
  });
}

function buildLayers() {
  Object.values(layerGroups).forEach(g => map.removeLayer(g));
  layerGroups = { mines: L.layerGroup(), crafts: L.layerGroup(), mints: L.layerGroup(), routes: L.layerGroup() };

  MINES.forEach(m => {
    if (statusFilter !== "all") {
      if (statusFilter === "active" && m.status !== "active") return;
      if (statusFilter === "historical" && m.status !== "historical") return;
    }
    const color = m.status === "active" ? "#7BE495" : "#D4AF37";
    const marker = L.marker([m.lat, m.lng], { icon: circleIcon(color, 12) });
    marker.on("click", () => showDetail("mines", m));
    marker.bindTooltip(n(m.name), { direction:"top", offset:[0,-8] });
    layerGroups.mines.addLayer(marker);
  });

  CRAFTS.forEach(c => {
    const marker = L.marker([c.lat, c.lng], { icon: diamondIcon(LAYER_META.crafts.color, 11) });
    marker.on("click", () => showDetail("crafts", c));
    marker.bindTooltip(n(c.name), { direction:"top", offset:[0,-8] });
    layerGroups.crafts.addLayer(marker);
  });

  // Mints with dynasty filter
  let mintCount = 0;
  MINTS.forEach(m => {
    if (dynastyFilter !== "all" && m.dynasty !== dynastyFilter) return;
    const marker = L.marker([m.lat, m.lng], { icon: circleIcon(LAYER_META.mints.color, 10) });
    marker.on("click", () => showDetail("mints", m));
    marker.bindTooltip(n(m.name), { direction:"top", offset:[0,-8] });
    layerGroups.mints.addLayer(marker);
    mintCount++;
  });

  ROUTES.forEach(r => {
    const polyline = L.polyline(r.points, { color: r.color, weight: 2.5, opacity: 0.6, dashArray: "8 6", lineCap: "round" });
    polyline.on("click", () => showDetail("routes", r));
    polyline.bindTooltip(n(r.name), { sticky: true });
    layerGroups.routes.addLayer(polyline);
    r.points.forEach(p => {
      L.circleMarker(p, { radius:3, color:r.color, fillColor:r.color, fillOpacity:0.4, weight:1, opacity:0.6 }).addTo(layerGroups.routes);
    });
  });

  Object.keys(layerGroups).forEach(k => {
    if (layersOn[k]) layerGroups[k].addTo(map);
  });

  updateStats();
  updateLegend();
  document.getElementById("mintCounter").textContent = layersOn.mints ? `🪙 ${mintCount}/${MINTS.length} ${t("mints")}` : "";
}

function showDetail(type, item) {
  const panel = document.getElementById("detailPanel");
  const color = LAYER_META[type].color;
  let html = `<div class="detail">`;
  html += `<button class="detail-close" onclick="clearDetail()">×</button>`;
  html += `<div class="detail-type" style="color:${color}">${LAYER_META[type].icon} ${t(type)}</div>`;
  html += `<h3>${n(item.name)}</h3>`;
  if (item.desc) html += `<p>${n(item.desc)}</p>`;
  if (item.period) html += `<div class="detail-row"><span class="detail-label">${t("period")}:</span><span class="detail-val">${item.period}</span></div>`;
  if (item.status) {
    const sColor = item.status==="active"?"#7BE495":item.status==="declining"?"#E8A0BF":"#D4AF37";
    html += `<div class="detail-row"><span class="detail-label">${t("status")}:</span><span class="detail-val" style="color:${sColor}">${t(item.status)}</span></div>`;
  }
  if (item.dynasty) html += `<div class="detail-row"><span class="detail-label">${t("dynasty")}:</span><span class="detail-val">${item.dynasty}</span></div>`;
  if (item.technique) html += `<div class="detail-row"><span class="detail-label">${t("technique")}:</span><span class="detail-val">${item.technique}</span></div>`;
  if (item.coins) html += `<div class="detail-row"><span class="detail-label">${t("coins")}:</span><span class="detail-val">${item.coins.join(", ")}</span></div>`;
  if (item.mineral) html += `<div class="detail-tags">${item.mineral.map(m=>`<span class="detail-tag">${m}</span>`).join("")}</div>`;
  // DarpIslam cross-reference link
  if (item.darpislam_id) {
    html += `<a class="detail-link" href="https://islamicatlas.org/mint/${item.darpislam_id}" target="_blank" rel="noopener noreferrer">
      🪙 ${t("darpislam")} · <span style="font-family:monospace;font-size:9px;opacity:.7">${item.darpislam_id}</span>
    </a>`;
  }
  if (item.lat) html += `<div style="font-size:10px;color:var(--text2);margin-top:8px;opacity:.7">📍 ${item.lat.toFixed(2)}°, ${item.lng.toFixed(2)}°${item.country ? " · "+item.country : ""}</div>`;
  html += `</div>`;
  panel.innerHTML = html;
}
function clearDetail() {
  document.getElementById("detailPanel").innerHTML = `<div class="hint">${t("hint")}</div>`;
}

function buildLayerToggles() {
  const container = document.getElementById("layerToggles");
  container.innerHTML = "";
  Object.keys(LAYER_META).forEach(key => {
    const btn = document.createElement("button");
    btn.className = "layer-btn" + (layersOn[key] ? " on" : "");
    btn.style.setProperty("--lc", LAYER_META[key].color);
    const count = key==="mines"?MINES.length : key==="crafts"?CRAFTS.length : key==="mints"?MINTS.length : ROUTES.length;
    btn.innerHTML = `<div class="layer-check"></div><span>${LAYER_META[key].icon}</span><span>${t(key)} (${count})</span>`;
    btn.onclick = () => {
      layersOn[key] = !layersOn[key];
      buildLayers();
      buildLayerToggles();
      buildDynastyFilter();
    };
    container.appendChild(btn);
  });
}

function buildFilters() {
  const group = document.getElementById("filterGroup");
  group.innerHTML = "";
  ["all","active","historical"].forEach(f => {
    const btn = document.createElement("button");
    btn.className = "filter-pill" + (statusFilter === f ? " active" : "");
    btn.textContent = t(f);
    btn.onclick = () => { statusFilter = f; buildLayers(); buildFilters(); };
    group.appendChild(btn);
  });
  document.getElementById("filterSection").style.display = layersOn.mines ? "" : "none";
}

function buildDynastyFilter() {
  const section = document.getElementById("dynastySection");
  const group = document.getElementById("dynastyGroup");
  section.style.display = layersOn.mints ? "" : "none";
  document.getElementById("dynastyLabel").textContent = t("dynastyFilter");
  group.innerHTML = "";
  // All button
  const allBtn = document.createElement("button");
  allBtn.className = "dynasty-pill" + (dynastyFilter === "all" ? " active" : "");
  allBtn.textContent = t("all");
  allBtn.onclick = () => { dynastyFilter = "all"; buildLayers(); buildDynastyFilter(); };
  group.appendChild(allBtn);
  // Dynasty buttons
  DYNASTIES.forEach(d => {
    const btn = document.createElement("button");
    btn.className = "dynasty-pill" + (dynastyFilter === d ? " active" : "");
    btn.textContent = d;
    btn.onclick = () => { dynastyFilter = d; buildLayers(); buildDynastyFilter(); };
    group.appendChild(btn);
  });
}

function updateStats() {
  let total = 0;
  if (layersOn.mines) total += layerGroups.mines.getLayers().filter(l => l instanceof L.Marker).length;
  if (layersOn.crafts) total += layerGroups.crafts.getLayers().filter(l => l instanceof L.Marker).length;
  if (layersOn.mints) total += layerGroups.mints.getLayers().filter(l => l instanceof L.Marker).length;
  document.getElementById("statsLine").textContent = `${total} ${t("total")}`;
}

function updateLegend() {
  const el = document.getElementById("legend");
  let html = "";
  if (layersOn.mines) {
    html += `<div class="legend-item"><div class="legend-dot" style="background:#7BE495"></div>${t("active")}</div>`;
    html += `<div class="legend-item"><div class="legend-dot" style="background:#D4AF37"></div>${t("historical")}</div>`;
  }
  if (layersOn.crafts) html += `<div class="legend-item"><div class="legend-diamond" style="background:${LAYER_META.crafts.color}"></div>${t("crafts")}</div>`;
  if (layersOn.mints) html += `<div class="legend-item"><div class="legend-dot" style="background:${LAYER_META.mints.color}"></div>${t("mints")} (${MINTS.length})</div>`;
  if (layersOn.routes) html += `<div class="legend-item"><div style="width:16px;height:2px;background:${LAYER_META.routes.color};border-radius:1px"></div>${t("routes")}</div>`;
  el.innerHTML = html;
}

function updateTexts() {
  document.getElementById("navTitle").textContent = t("nav");
  document.getElementById("mapTitle").textContent = t("title");
  document.getElementById("mapSub").textContent = t("sub");
  document.getElementById("layerLabel").textContent = t("layers");
  clearDetail();
}

document.querySelectorAll(".lang-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    lang = btn.dataset.lang;
    document.querySelectorAll(".lang-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    document.documentElement.dir = lang === "ar" ? "rtl" : "ltr";
    if (lang === "ar") {
      document.getElementById("sidebar").style.borderRight = "none";
      document.getElementById("sidebar").style.borderLeft = "1px solid var(--border)";
      document.getElementById("sidebar").style.order = "1";
    } else {
      document.getElementById("sidebar").style.borderRight = "1px solid var(--border)";
      document.getElementById("sidebar").style.borderLeft = "none";
      document.getElementById("sidebar").style.order = "0";
    }
    updateTexts(); buildLayerToggles(); buildFilters(); buildDynastyFilter(); buildLayers();
  });
});

document.getElementById("modeBtn").addEventListener("click", () => {
  isDark = !isDark;
  document.body.classList.toggle("light", !isDark);
  document.getElementById("modeBtn").textContent = isDark ? "☀️" : "🌙";
  map.removeLayer(tileLayer);
  tileLayer = L.tileLayer(isDark ? DARK_TILES : LIGHT_TILES, { subdomains:"abcd", maxZoom:19 }).addTo(map);
});

document.addEventListener("DOMContentLoaded", () => {
  initMap(); buildLayerToggles(); buildFilters(); buildDynastyFilter(); updateTexts();
});
</script>
</body>
</html>
