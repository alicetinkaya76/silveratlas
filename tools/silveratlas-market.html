<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SilverAtlas — Gümüş Piyasa</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0f14;--bg2:#1a1a24;--bg3:#111118;--text:#e8e8ec;--text2:#9a9aaa;--border:rgba(192,192,192,0.1);--accent:#C0C0C0;--gold:#D4AF37;--green:#7BE495;--red:#FF6B6B;--fd:'Playfair Display',Georgia,serif;--fb:'Source Sans 3',sans-serif;--fm:'JetBrains Mono',monospace;}
.light{--bg:#FAFAF5;--bg2:#fff;--bg3:#f5f5f0;--text:#2C2C2C;--text2:#6B7280;--border:rgba(0,0,0,0.06);--accent:#708090;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--fb);background:var(--bg);color:var(--text);min-height:100vh;}
.nav{position:sticky;top:0;z-index:100;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;background:var(--bg);border-bottom:1px solid var(--border);backdrop-filter:blur(16px);}
.nav-brand{display:flex;align-items:center;gap:8px;}
.nav-logo{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--gold));display:flex;align-items:center;justify-content:center;font:700 11px var(--fd);color:#0f0f14;}
.nav-title{font:600 15px var(--fd);}
.ctrls{display:flex;align-items:center;gap:10px;}
.lng{display:flex;gap:2px;background:rgba(128,128,128,.08);border-radius:6px;padding:2px;}
.lng button{border:none;cursor:pointer;padding:3px 8px;border-radius:4px;font-size:11px;background:transparent;color:var(--text2);transition:all .2s;font-family:var(--fb);}
.lng button.on{background:rgba(192,192,192,.15);color:var(--text);font-weight:600;}
.mbtn{border:none;cursor:pointer;background:transparent;color:var(--text2);font-size:15px;}

.container{max-width:1100px;margin:0 auto;padding:32px 24px 64px;}

/* TICKER */
.ticker{display:flex;align-items:center;gap:16px;padding:20px 24px;background:var(--bg2);border:1px solid var(--border);border-radius:16px;margin-bottom:24px;flex-wrap:wrap;}
.ticker-main{flex:1;min-width:200px;}
.ticker-label{font-size:11px;color:var(--text2);margin-bottom:4px;display:flex;align-items:center;gap:6px;}
.ticker-price{font:700 36px var(--fm);letter-spacing:-.02em;line-height:1;}
.ticker-change{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:6px;font:600 13px var(--fm);margin-left:12px;}
.ticker-meta{display:flex;gap:24px;flex-wrap:wrap;}
.ticker-item{text-align:center;min-width:80px;}
.ticker-item .val{font:600 16px var(--fm);display:block;}
.ticker-item .lbl{font-size:10px;color:var(--text2);margin-top:2px;}
.pulse-dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(123,228,149,.4)}50%{opacity:.7;box-shadow:0 0 0 6px rgba(123,228,149,0)}}

/* CHART */
.chart-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:24px;}
.chart-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px;}
.chart-title{font:600 16px var(--fd);}
.chart-pills{display:flex;gap:4px;}
.cpill{border:1px solid var(--border);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:10px;background:transparent;color:var(--text2);transition:all .2s;font-family:var(--fb);}
.cpill.on{border-color:var(--gold);background:rgba(212,175,55,.1);color:var(--gold);font-weight:600;}
canvas{width:100%!important;display:block;}

/* TOOLS GRID */
.tools{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:20px;margin-bottom:24px;}
.tool-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:24px;}
.tool-title{font:600 15px var(--fd);margin-bottom:4px;display:flex;align-items:center;gap:8px;}
.tool-sub{font-size:12px;color:var(--text2);margin-bottom:18px;}

/* Input groups */
.input-group{margin-bottom:14px;}
.input-label{font-size:11px;color:var(--text2);margin-bottom:5px;display:block;font-weight:500;}
.input-row{display:flex;gap:8px;}
.input-field{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font:500 16px var(--fm);outline:none;transition:border-color .2s;width:100%;}
.input-field:focus{border-color:var(--gold);}
.input-select{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font:13px var(--fb);outline:none;cursor:pointer;min-width:80px;}

/* Results */
.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.result-box{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:center;}
.result-box .rv{font:600 18px var(--fm);display:block;margin-bottom:2px;}
.result-box .rl{font-size:10px;color:var(--text2);}

/* Price table */
.price-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:12px;}
.price-table th{text-align:left;padding:10px 12px;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border);font-size:11px;text-transform:uppercase;letter-spacing:.04em;}
.price-table td{padding:10px 12px;border-bottom:1px solid var(--border);}
.price-table tr:last-child td{border-bottom:none;}
.price-table .mono{font-family:var(--fm);font-weight:500;}
[dir=rtl] .price-table th{text-align:right;}

/* Comparison */
.compare-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
.compare-row:last-child{border-bottom:none;}
.compare-bar{flex:1;height:8px;border-radius:4px;background:var(--border);overflow:hidden;position:relative;}
.compare-fill{height:100%;border-radius:4px;transition:width .6s ease;}
.compare-label{font-size:12px;min-width:60px;}
.compare-val{font:500 12px var(--fm);min-width:70px;text-align:right;}

footer{border-top:1px solid var(--border);padding:24px;text-align:center;background:var(--bg3);}
footer p{font-size:11px;color:var(--text2);}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:fadeUp .5s ease both;}
@media(max-width:700px){.ticker{flex-direction:column;align-items:flex-start;}.ticker-meta{width:100%;justify-content:space-between;}}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ─── SIMULATED MARKET DATA ───────────────────────────────
const SPOT_USD = 32.45; // $/troy oz
const PREV_CLOSE = 32.18;
const RATES = { TRY: 38.42, EUR: 0.92, SAR: 3.75, GBP: 0.79 };
const TROY_OZ_GRAMS = 31.1035;
const SPOT_GRAM_USD = SPOT_USD / TROY_OZ_GRAMS;

// 30-day simulated price history
const HISTORY_30D = [];
let p = 30.5;
for (let i = 30; i >= 0; i--) {
  p += (Math.random() - 0.48) * 0.6;
  p = Math.max(28, Math.min(35, p));
  HISTORY_30D.push({ day: 30 - i, price: +p.toFixed(2) });
}
HISTORY_30D[HISTORY_30D.length - 1].price = SPOT_USD;

// 7-day subset
const HISTORY_7D = HISTORY_30D.slice(-7);
// 90-day simulated
const HISTORY_90D = [];
let q = 28;
for (let i = 90; i >= 0; i--) {
  q += (Math.random() - 0.47) * 0.5;
  q = Math.max(25, Math.min(35, q));
  HISTORY_90D.push({ day: 90 - i, price: +q.toFixed(2) });
}
HISTORY_90D[HISTORY_90D.length - 1].price = SPOT_USD;

const DATASETS = { "7d": HISTORY_7D, "30d": HISTORY_30D, "90d": HISTORY_90D };

// ─── I18N ────────────────────────────────────────────────
const UI = {
  tr:{
    title:"Gümüş Piyasa",badge:"📈 Canlı Piyasa",sub:"Gümüş spot fiyat, dönüştürücü araçlar ve piyasa karşılaştırması",
    spotLabel:"Gümüş Spot Fiyat (XAG)",live:"Canlı",
    ozLabel:"Troy Ons",gramLabel:"Gram",kgLabel:"Kilogram",
    dayChange:"Günlük Değ.",weekChange:"Haftalık",monthChange:"Aylık",
    chartTitle:"Fiyat Grafiği (USD/oz)",
    convTitle:"💱 Fiyat Dönüştürücü",convSub:"Ağırlık ve para birimi dönüşümü",
    weight:"Ağırlık",unit:"Birim",gram:"Gram",oz:"Ons",troy:"Troy Ons",kg:"Kilogram",
    valueTitle:"⚖️ 925 Değer Hesaplayıcı",valueSub:"Takınızın gümüş değerini hesaplayın",
    fineness:"Ayar",productWeight:"Ürün Ağırlığı (g)",silverValue:"Gümüş Değeri",
    pureWeight:"Saf Gümüş",currency:"Para Birimi",
    compareTitle:"Kıymetli Maden Karşılaştırması",
    priceTable:"Birim Fiyat Tablosu",
    disclaimer:"Fiyatlar bilgilendirme amaçlıdır. Gerçek zamanlı değildir.",
    perGram:"/ gram",perOz:"/ troy ons",perKg:"/ kg",
  },
  en:{
    title:"Silver Market",badge:"📈 Live Market",sub:"Silver spot price, converter tools, and market comparison",
    spotLabel:"Silver Spot Price (XAG)",live:"Live",
    ozLabel:"Troy Oz",gramLabel:"Gram",kgLabel:"Kilogram",
    dayChange:"Daily Chg.",weekChange:"Weekly",monthChange:"Monthly",
    chartTitle:"Price Chart (USD/oz)",
    convTitle:"💱 Price Converter",convSub:"Weight and currency conversion",
    weight:"Weight",unit:"Unit",gram:"Gram",oz:"Ounce",troy:"Troy Oz",kg:"Kilogram",
    valueTitle:"⚖️ 925 Value Calculator",valueSub:"Calculate your jewelry's silver value",
    fineness:"Fineness",productWeight:"Product Weight (g)",silverValue:"Silver Value",
    pureWeight:"Pure Silver",currency:"Currency",
    compareTitle:"Precious Metal Comparison",
    priceTable:"Unit Price Table",
    disclaimer:"Prices are for informational purposes. Not real-time.",
    perGram:"/ gram",perOz:"/ troy oz",perKg:"/ kg",
  },
  ar:{
    title:"سوق الفضة",badge:"📈 السوق المباشر",sub:"سعر الفضة الفوري وأدوات التحويل ومقارنة السوق",
    spotLabel:"سعر الفضة الفوري (XAG)",live:"مباشر",
    ozLabel:"أونصة تروي",gramLabel:"غرام",kgLabel:"كيلوغرام",
    dayChange:"التغيير اليومي",weekChange:"أسبوعي",monthChange:"شهري",
    chartTitle:"مخطط الأسعار (دولار/أونصة)",
    convTitle:"💱 محول الأسعار",convSub:"تحويل الوزن والعملات",
    weight:"الوزن",unit:"الوحدة",gram:"غرام",oz:"أونصة",troy:"أونصة تروي",kg:"كيلوغرام",
    valueTitle:"⚖️ حاسبة قيمة 925",valueSub:"احسب قيمة الفضة في مجوهراتك",
    fineness:"العيار",productWeight:"وزن المنتج (غ)",silverValue:"قيمة الفضة",
    pureWeight:"الفضة النقية",currency:"العملة",
    compareTitle:"مقارنة المعادن الثمينة",
    priceTable:"جدول أسعار الوحدات",
    disclaimer:"الأسعار لأغراض إعلامية فقط. ليست لحظية.",
    perGram:"/ غرام",perOz:"/ أونصة تروي",perKg:"/ كغ",
  },
};

let lang="tr", dark=true, chartPeriod="30d";
let convWeight=100, convUnit="gram", convCurrency="TRY";
let calcFineness=925, calcWeight=15, calcCurrency="TRY";

function u(k){return UI[lang]?.[k]||UI.en[k]||k;}
function fmt(n,d=2){return n.toLocaleString(lang==="ar"?"ar-SA":lang==="tr"?"tr-TR":"en-US",{minimumFractionDigits:d,maximumFractionDigits:d});}
function curr(c){return {USD:"$",TRY:"₺",EUR:"€",SAR:"﷼",GBP:"£"}[c]||c;}

// ─── RENDER ──────────────────────────────────────────────
function render(){
  const change = SPOT_USD - PREV_CLOSE;
  const changePct = (change / PREV_CLOSE) * 100;
  const isUp = change >= 0;
  const chColor = isUp ? "var(--green)" : "var(--red)";
  const chBg = isUp ? "rgba(123,228,149,.1)" : "rgba(255,107,107,.1)";
  const arrow = isUp ? "▲" : "▼";

  const weekChange = ((SPOT_USD - HISTORY_30D[HISTORY_30D.length-7]?.price) / HISTORY_30D[HISTORY_30D.length-7]?.price * 100) || 0;
  const monthChange = ((SPOT_USD - HISTORY_30D[0]?.price) / HISTORY_30D[0]?.price * 100) || 0;

  // Converter calculations
  let convGrams = convWeight;
  if(convUnit==="oz") convGrams = convWeight * 28.3495;
  else if(convUnit==="troy") convGrams = convWeight * TROY_OZ_GRAMS;
  else if(convUnit==="kg") convGrams = convWeight * 1000;
  const convValueUSD = convGrams * SPOT_GRAM_USD;
  const convRate = convCurrency === "USD" ? 1 : RATES[convCurrency] || 1;
  const convValueLocal = convValueUSD * convRate;
  const convTroy = convGrams / TROY_OZ_GRAMS;

  // 925 Calculator
  const calcPureSilver = (calcFineness / 1000) * calcWeight;
  const calcValueUSD = calcPureSilver * SPOT_GRAM_USD;
  const calcRate = calcCurrency === "USD" ? 1 : RATES[calcCurrency] || 1;
  const calcValueLocal = calcValueUSD * calcRate;

  const app = document.getElementById("app");
  app.innerHTML = `
    <nav class="nav">
      <div class="nav-brand"><div class="nav-logo">Ag</div><span class="nav-title">SilverAtlas</span></div>
      <div class="ctrls">
        <div class="lng">${["tr","en","ar"].map(l=>`<button class="${lang===l?"on":""}" onclick="setLang('${l}')" ${l==="ar"?'style="font-family:Noto Naskh Arabic,serif"':""}>${l==="ar"?"عر":l.toUpperCase()}</button>`).join("")}</div>
        <button class="mbtn" onclick="toggleDark()">${dark?"☀️":"🌙"}</button>
      </div>
    </nav>
    <div class="container">
      <!-- HERO -->
      <div style="text-align:center;margin-bottom:32px" class="anim">
        <div style="display:inline-block;padding:4px 14px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.1em;color:var(--gold);border:1px solid rgba(212,175,55,.3);margin-bottom:12px">${u("badge")}</div>
        <h1 style="font:700 clamp(24px,4vw,36px)/1.15 var(--fd);margin-bottom:8px">${u("title")}</h1>
        <p style="font-size:14px;color:var(--text2)">${u("sub")}</p>
      </div>

      <!-- TICKER -->
      <div class="ticker anim" style="animation-delay:.1s">
        <div class="ticker-main">
          <div class="ticker-label"><span class="pulse-dot"></span> ${u("spotLabel")} · <span style="color:var(--green);font-weight:600">${u("live")}</span></div>
          <div style="display:flex;align-items:baseline;flex-wrap:wrap;gap:8px">
            <span class="ticker-price">$${fmt(SPOT_USD)}</span>
            <span class="ticker-change" style="background:${chBg};color:${chColor}">${arrow} ${fmt(Math.abs(change))} (${changePct>=0?"+":""}${fmt(changePct)}%)</span>
          </div>
        </div>
        <div class="ticker-meta">
          <div class="ticker-item"><span class="val" style="color:var(--text)">₺${fmt(SPOT_USD*RATES.TRY)}</span><span class="lbl">${u("ozLabel")} (TRY)</span></div>
          <div class="ticker-item"><span class="val" style="color:var(--text)">₺${fmt(SPOT_GRAM_USD*RATES.TRY)}</span><span class="lbl">${u("gramLabel")} (TRY)</span></div>
          <div class="ticker-item"><span class="val" style="color:${weekChange>=0?"var(--green)":"var(--red)"}">${weekChange>=0?"+":""}${fmt(weekChange)}%</span><span class="lbl">${u("weekChange")}</span></div>
          <div class="ticker-item"><span class="val" style="color:${monthChange>=0?"var(--green)":"var(--red)"}">${monthChange>=0?"+":""}${fmt(monthChange)}%</span><span class="lbl">${u("monthChange")}</span></div>
        </div>
      </div>

      <!-- CHART -->
      <div class="chart-wrap anim" style="animation-delay:.15s">
        <div class="chart-head">
          <span class="chart-title">${u("chartTitle")}</span>
          <div class="chart-pills">
            ${["7d","30d","90d"].map(p=>`<button class="cpill ${chartPeriod===p?"on":""}" onclick="setPeriod('${p}')">${p.replace("d",lang==="tr"?" gün":lang==="ar"?" يوم":" days")}</button>`).join("")}
          </div>
        </div>
        <canvas id="chart" height="200"></canvas>
      </div>

      <!-- TOOLS -->
      <div class="tools">
        <!-- CONVERTER -->
        <div class="tool-card anim" style="animation-delay:.2s">
          <div class="tool-title">${u("convTitle")}</div>
          <div class="tool-sub">${u("convSub")}</div>
          <div class="input-group">
            <span class="input-label">${u("weight")}</span>
            <div class="input-row">
              <input class="input-field" type="number" value="${convWeight}" oninput="convWeight=+this.value;render()">
              <select class="input-select" onchange="convUnit=this.value;render()">
                <option value="gram" ${convUnit==="gram"?"selected":""}>${u("gram")}</option>
                <option value="oz" ${convUnit==="oz"?"selected":""}>${u("oz")}</option>
                <option value="troy" ${convUnit==="troy"?"selected":""}>${u("troy")}</option>
                <option value="kg" ${convUnit==="kg"?"selected":""}>${u("kg")}</option>
              </select>
            </div>
          </div>
          <div class="input-group">
            <span class="input-label">${u("currency")}</span>
            <select class="input-select" style="width:100%" onchange="convCurrency=this.value;render()">
              ${["TRY","USD","EUR","SAR","GBP"].map(c=>`<option value="${c}" ${convCurrency===c?"selected":""}>${c} (${curr(c)})</option>`).join("")}
            </select>
          </div>
          <div class="result-grid" style="margin-top:16px">
            <div class="result-box"><span class="rv" style="color:var(--gold)">${curr(convCurrency)}${fmt(convValueLocal)}</span><span class="rl">${u("silverValue")}</span></div>
            <div class="result-box"><span class="rv">$${fmt(convValueUSD)}</span><span class="rl">USD</span></div>
            <div class="result-box"><span class="rv">${fmt(convGrams,1)}g</span><span class="rl">${u("gram")}</span></div>
            <div class="result-box"><span class="rv">${fmt(convTroy,3)}</span><span class="rl">${u("troy")}</span></div>
          </div>
        </div>

        <!-- 925 CALCULATOR -->
        <div class="tool-card anim" style="animation-delay:.25s">
          <div class="tool-title">${u("valueTitle")}</div>
          <div class="tool-sub">${u("valueSub")}</div>
          <div class="input-group">
            <span class="input-label">${u("fineness")}</span>
            <div class="input-row">
              <input class="input-field" type="range" min="500" max="999" value="${calcFineness}" oninput="calcFineness=+this.value;render()" style="padding:14px;cursor:pointer">
              <div style="min-width:55px;text-align:center;font:600 16px var(--fm);padding:8px">${calcFineness}</div>
            </div>
            <div style="display:flex;gap:4px;margin-top:6px">
              ${[800,900,925,950,999].map(f=>`<button onclick="calcFineness=${f};render()" style="border:1px solid ${calcFineness===f?"var(--gold)":"var(--border)"};border-radius:6px;padding:3px 8px;font-size:10px;cursor:pointer;background:${calcFineness===f?"rgba(212,175,55,.1)":"transparent"};color:${calcFineness===f?"var(--gold)":"var(--text2)"};font-family:var(--fm)">${f}</button>`).join("")}
            </div>
          </div>
          <div class="input-group">
            <span class="input-label">${u("productWeight")}</span>
            <input class="input-field" type="number" value="${calcWeight}" oninput="calcWeight=+this.value;render()">
          </div>
          <div class="input-group">
            <span class="input-label">${u("currency")}</span>
            <select class="input-select" style="width:100%" onchange="calcCurrency=this.value;render()">
              ${["TRY","USD","EUR","SAR","GBP"].map(c=>`<option value="${c}" ${calcCurrency===c?"selected":""}>${c} (${curr(c)})</option>`).join("")}
            </select>
          </div>
          <!-- visual bar -->
          <div style="height:10px;border-radius:5px;overflow:hidden;display:flex;margin:16px 0 8px;border:1px solid var(--border)">
            <div style="width:${calcFineness/10}%;background:linear-gradient(90deg,var(--accent),#e0e0e0);display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:600;color:#1a1a2e">Ag ${(calcFineness/10).toFixed(1)}%</div>
            <div style="width:${100-calcFineness/10}%;background:linear-gradient(90deg,#b87333,#cd8c52)"></div>
          </div>
          <div class="result-grid">
            <div class="result-box"><span class="rv" style="color:var(--gold)">${curr(calcCurrency)}${fmt(calcValueLocal)}</span><span class="rl">${u("silverValue")}</span></div>
            <div class="result-box"><span class="rv">${fmt(calcPureSilver,2)}g</span><span class="rl">${u("pureWeight")}</span></div>
          </div>
        </div>
      </div>

      <!-- PRICE TABLE -->
      <div class="tool-card anim" style="animation-delay:.3s;margin-bottom:24px">
        <div class="tool-title">📊 ${u("priceTable")}</div>
        <table class="price-table">
          <thead><tr><th>${u("unit")}</th><th>USD ($)</th><th>TRY (₺)</th><th>EUR (€)</th><th>SAR (﷼)</th></tr></thead>
          <tbody>
            <tr><td>1 ${u("gram")}</td><td class="mono">$${fmt(SPOT_GRAM_USD)}</td><td class="mono">₺${fmt(SPOT_GRAM_USD*RATES.TRY)}</td><td class="mono">€${fmt(SPOT_GRAM_USD*RATES.EUR)}</td><td class="mono">﷼${fmt(SPOT_GRAM_USD*RATES.SAR)}</td></tr>
            <tr><td>1 ${u("troy")}</td><td class="mono">$${fmt(SPOT_USD)}</td><td class="mono">₺${fmt(SPOT_USD*RATES.TRY)}</td><td class="mono">€${fmt(SPOT_USD*RATES.EUR)}</td><td class="mono">﷼${fmt(SPOT_USD*RATES.SAR)}</td></tr>

      <!-- COMPARISON -->
      <div class="tool-card anim" style="animation-delay:.35s;margin-bottom:24px">

            {name:lang==="tr"?"Gümüş":lang==="ar"?"الفضة":"Silver",price:SPOT_USD,color:"var(--accent)",pct:100},
            {name:lang==="tr"?"Altın":lang==="ar"?"الذهب":"Gold",price:2340,color:"var(--gold)",pct:100},
            {name:lang==="tr"?"Platin":lang==="ar"?"البلاتين":"Platinum",price:1020,color:"#E5E4E2",pct:(1020/2340)*100},
            {name:lang==="tr"?"Paladyum":lang==="ar"?"البالاديوم":"Palladium",price:980,color:"#CED4DA",pct:(980/2340)*100},
          ].map(m=>`
            <div class="compare-row">
              <span class="compare-label">${m.name}</span>
              <div class="compare-bar"><div class="compare-fill" style="width:${m.name.includes("ümüş")||m.name==="Silver"||m.name==="الفضة"?(SPOT_USD/2340)*100:m.pct}%;background:${m.color}"></div></div>
              <span class="compare-val">$${fmt(m.price,0)}/oz</span>

          <div style="font-size:10px;color:var(--text2);margin-top:8px;text-align:center">

      <div style="text-align:center;font-size:11px;color:var(--text2);opacity:.6;margin-top:8px">${u("disclaimer")}</div>

  `;

  drawChart();
}

// ─── CHART ───────────────────────────────────────────────
function drawChart(){
  const canvas = document.getElementById("chart");
  if(!canvas) return;
  const ctx = canvas.getContext("2d");
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = 200 * dpr;
  ctx.scale(dpr, dpr);
  const W = rect.width, H = 200;

  const data = DATASETS[chartPeriod] || HISTORY_30D;
  const prices = data.map(d=>d.price);
  const minP = Math.min(...prices) - 0.5;
  const maxP = Math.max(...prices) + 0.5;
  const rangeP = maxP - minP;

  const padL=40, padR=10, padT=10, padB=30;
  const cW = W-padL-padR, cH = H-padT-padB;

  const toX = i => padL + (i/(data.length-1))*cW;
  const toY = p => padT + (1-(p-minP)/rangeP)*cH;

  // Grid
  ctx.strokeStyle = dark ? "rgba(192,192,192,.06)" : "rgba(0,0,0,.04)";
  ctx.lineWidth = 1;
  const gridSteps = 5;
  for(let i=0;i<=gridSteps;i++){
    const y = padT + (i/gridSteps)*cH;
    ctx.beginPath(); ctx.moveTo(padL,y); ctx.lineTo(W-padR,y); ctx.stroke();
    const val = maxP - (i/gridSteps)*rangeP;
    ctx.fillStyle = dark ? "#666" : "#aaa";
    ctx.font = "10px 'JetBrains Mono'";
    ctx.textAlign = "right";
    ctx.fillText("$"+val.toFixed(1), padL-6, y+4);
  }

  // Area gradient
  const grad = ctx.createLinearGradient(0,padT,0,H-padB);
  const isUp = prices[prices.length-1] >= prices[0];
  const lineColor = isUp ? "#7BE495" : "#FF6B6B";
  grad.addColorStop(0, lineColor+"30");
  grad.addColorStop(1, lineColor+"02");

  ctx.beginPath();
  ctx.moveTo(toX(0), H-padB);
  data.forEach((d,i) => ctx.lineTo(toX(i), toY(d.price)));
  ctx.lineTo(toX(data.length-1), H-padB);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Line
  ctx.beginPath();
  data.forEach((d,i) => i===0 ? ctx.moveTo(toX(i),toY(d.price)) : ctx.lineTo(toX(i),toY(d.price)));
  ctx.strokeStyle = lineColor;
  ctx.lineWidth = 2;
  ctx.lineJoin = "round";
  ctx.stroke();

  // Current price dot
  const lastI = data.length-1;
  ctx.beginPath();
  ctx.arc(toX(lastI), toY(data[lastI].price), 4, 0, Math.PI*2);
  ctx.fillStyle = lineColor;
  ctx.fill();
  ctx.strokeStyle = dark ? "#0f0f14" : "#fff";
  ctx.lineWidth = 2;
  ctx.stroke();

  // Price label
  ctx.fillStyle = lineColor;
  ctx.font = "600 11px 'JetBrains Mono'";
  ctx.textAlign = "right";
  ctx.fillText("$"+data[lastI].price.toFixed(2), toX(lastI)-8, toY(data[lastI].price)-8);
}

// ─── ACTIONS ─────────────────────────────────────────────
window.setLang = function(l){
  lang=l;
  document.documentElement.dir=l==="ar"?"rtl":"ltr";
  render();
};
window.toggleDark = function(){
  dark=!dark;
  document.body.classList.toggle("light",!dark);
  render();
};
window.setPeriod = function(p){
  chartPeriod=p;
  render();
};

window.addEventListener("resize", ()=>{ drawChart(); });
render();
</script>
